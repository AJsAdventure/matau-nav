# Drop-in for matau-daemon.service — installed to
# /etc/systemd/system/matau-daemon.service.d/10-matau.conf
[Unit]
# Anchor watch reads position from state_server; start after it (daemon still
# degrades gracefully — autopilot works and gps_loss alarms if state is down).
After=matau-state.service

[Service]
# Wire the buzzer: uncomment and set the BCM pin once the hardware is
# connected (active piezo between the GPIO pin and GND), then
#   sudo systemctl daemon-reload && sudo systemctl restart matau-daemon
# Environment=MATAU_BUZZER_GPIO=17

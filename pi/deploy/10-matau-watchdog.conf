# Hardware watchdog (BCM2835): systemd feeds it; if the kernel or systemd
# hangs (classic SD-card I/O lockup), the SoC reboots the Pi instead of the
# boat losing all services until someone notices. Installed to
# /etc/systemd/system.conf.d/ — takes effect after `systemctl daemon-reexec`.
[Manager]
RuntimeWatchdogSec=15s
RebootWatchdogSec=10min
